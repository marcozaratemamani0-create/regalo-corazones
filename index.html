<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novia ❤️</title>
    <style>
        body {
            background-color: #0b001a; /* Color del espacio oscuro */
            color: white;
            font-family: sans-serif;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        .planetas y estrellas {
            margin-top: 25vh;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff3366;
        }

        p {
            font-size: 1.5rem;
            color: #ffb3d9;
        }

        .corazon {
            position: absolute;
            bottom: -50px;
            font-size: 30px;
            animation: flotar 4s linear infinite;
        }

        @keyframes flotar {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="universo">
        <!-- ✍️ LILYCITA TE AMO-->
        <h1>¡te amo, [LILY TE AMO]! ❤️</h1>
        <p>Tambien te extraño</p>
        
        <!-- Corazones flotando -->
        <div class="corazon" style="left: 10%; animation-delay: 0s;">❤️</div>
        <div class="corazon" style="left: 25%; animation-delay: 1.5s;">💖</div>
        <div class="corazon" style="left: 40%; animation-delay: 0.5s;">❤️</div>
        <div class="corazon" style="left: 55%; animation-delay: 2s;">💝</div>
        <div class="corazon" style="left: 70%; animation-delay: 1s;">❤️</div>
        <div class="corazon" style="left: 85%; animation-delay: 2.5s;">💘</div>
    </div>

    <!-- 🎵 REPRODUCTOR DE MÚSICA OCULTO (Update love message and add floating hearts) -->
    <!-- Nota: Los navegadores modernos exigen que la novia toque la pantalla una vez para que empiece a sonar -->
    <iframe width="0" height="0" src="https://youtube.com" frameborder="0" allow="autoplay"></iframe>

</body>
</html>
